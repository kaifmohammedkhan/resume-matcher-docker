version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
    volumes:
      # ✅ Persist logs and SQLite DB
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - app-net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
      POSTGRES_DB: resume_db
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

  # --- ISOLATED SECURITY SCAN SERVICE ---
  dependency-check:
    image: owasp/dependency-check
    profiles: ["tools"] # <--- Prevents auto-run with `docker compose up`
    volumes:
      - .:/src
      - odc-data:/usr/share/dependency-check/data
    environment:
      - NVD_API_KEY=3b65f076-a965-4b0c-92d6-151b4dfe3805
    command: >
      --scan /src
      --format HTML
      --out /src/report
      --nvdApiKey 3b65f076-a965-4b0c-92d6-151b4dfe3805
      --exclude '**/node_modules/**'
      --exclude '**/db-data/**'

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app-net

volumes:
  db-data:
  odc-data:

networks:
  app-net:
